name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create cfe-app com.shjaliq.cfe "CFE-放置养成"

      - name: Copy game files
        run: |
          rm -rf cfe-app/www/*
          cp index.html cfe-app/www/
          cp -r data cfe-app/www/
          cp -r assets cfe-app/www/

      - name: Add Android platform
        working-directory: cfe-app
        run: cordova platform add android

      - name: Build debug APK
        working-directory: cfe-app
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cfe-apk
          path: cfe-app/platforms/android/app/build/outputs/apk/debug/*.apk
